<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - بيانات الزوار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at top right, #1a0033 0%, #0a0a0a 80%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: auto;
        }
        h1 {
            color: #a855f7;
            margin-bottom: 20px;
            font-size: 2rem;
            text-align: center;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 15px;
            padding: 20px 30px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #a855f7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 15, 26, 0.9);
            border-radius: 15px;
            overflow: auto;
            display: block;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }
        th {
            background: #a855f7;
        }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 25px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            th, td { font-size: 0.7rem; padding: 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 بيانات زوار الموقع</h1>
        
        <div class="stats">
            <div class="stat-card"><h3>إجمالي الزوار</h3><div class="number" id="total">0</div></div>
            <div class="stat-card"><h3>زوار اليوم</h3><div class="number" id="today">0</div></div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 تحديث</button>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>#</th><th>التاريخ</th><th>الوقت</th><th>IP</th><th>الدولة</th><th>المدينة</th><th>الجهاز</th><th>نظام التشغيل</th><th>المتصفح</th><th>الصفحة</th></tr>
                </thead>
                <tbody id="visitorsBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        function loadData() {
            const visitors = JSON.parse(localStorage.getItem('visitors') || '[]');
            const tbody = document.getElementById('visitorsBody');
            const total = document.getElementById('total');
            const today = document.getElementById('today');
            
            total.textContent = visitors.length;
            
            const todayDate = new Date().toLocaleDateString('ar-EG');
            let todayCount = 0;
            
            tbody.innerHTML = '';
            visitors.forEach((v, i) => {
                const visitDate = v.time?.split('،')[0] || '';
                if (visitDate === todayDate) todayCount++;
                
                const parts = v.time?.split('،') || ['-', '-'];
                tbody.innerHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td>${parts[0] || '-'}</td>
                        <td>${parts[1] || '-'}</td>
                        <td>${v.ip || '-'}</td>
                        <td>${v.country || '-'}</td>
                        <td>${v.city || '-'}</td>
                        <td>${v.device || '-'}</td>
                        <td>${v.os || '-'}</td>
                        <td>${v.browser || '-'}</td>
                        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;">${v.url?.split('/').pop() || '-'}</td>
                    </tr>
                `;
            });
            
            today.textContent = todayCount;
        }
        
        loadData();
    </script>
</body>
</html>
