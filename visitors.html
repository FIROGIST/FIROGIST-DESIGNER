<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - بيانات الزوار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at top right, #1a0033 0%, #0a0a0a 80%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: auto;
        }
        h1 {
            color: #a855f7;
            margin-bottom: 20px;
            font-size: 2rem;
            text-align: center;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 15px;
            padding: 20px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #a855f7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 15, 26, 0.9);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }
        th {
            background: #a855f7;
            color: #fff;
            font-weight: 600;
        }
        tr:hover {
            background: rgba(168, 85, 247, 0.1);
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 25px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 0.7rem;
            }
            .stat-card {
                padding: 10px 20px;
            }
            .stat-card .number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 بيانات زوار الموقع</h1>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3>إجمالي الزوار</h3>
                <div class="number" id="totalVisitors">0</div>
            </div>
            <div class="stat-card">
                <h3>زوار اليوم</h3>
                <div class="number" id="todayVisitors">0</div>
            </div>
            <div class="stat-card">
                <h3>زوار هذا الأسبوع</h3>
                <div class="number" id="weekVisitors">0</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 تحديث البيانات</button>
        
        <table id="visitorsTable">
            <thead>
                <tr><th>#</th><th>التاريخ</th><th>الوقت</th><th>IP</th><th>الدولة</th><th>المدينة</th><th>الجهاز</th><th>نظام التشغيل</th><th>المتصفح</th><th>الصفحة</th></tr>
            </thead>
            <tbody id="visitorsBody">
                <tr><td colspan="10" class="no-data">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
    
    <script>
        function loadData() {
            fetch('visitors.json?' + Date.now())
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('visitorsBody');
                    const total = document.getElementById('totalVisitors');
                    const today = document.getElementById('todayVisitors');
                    const week = document.getElementById('weekVisitors');
                    
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="10" class="no-data">لا توجد بيانات بعد</td></tr>';
                        total.textContent = '0';
                        today.textContent = '0';
                        week.textContent = '0';
                        return;
                    }
                    
                    total.textContent = data.length;
                    
                    const todayDate = new Date().toLocaleDateString('ar-EG');
                    const weekAgo = new Date();
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    
                    let todayCount = 0;
                    let weekCount = 0;
                    
                    tbody.innerHTML = '';
                    data.forEach((v, i) => {
                        // حساب إحصائيات
                        const visitDate = new Date(v.time || v.received_at);
                        if (visitDate.toLocaleDateString('ar-EG') === todayDate) todayCount++;
                        if (visitDate >= weekAgo) weekCount++;
                        
                        // عرض البيانات
                        const timeParts = (v.time || v.received_at || '').split(' ');
                        const date = timeParts[0] || '-';
                        const time = timeParts[1] || '-';
                        
                        tbody.innerHTML += `
                            <tr>
                                <td>${i+1}</td>
                                <td>${date}</td>
                                <td>${time}</td>
                                <td>${v.ip || '-'}</td>
                                <td>${v.country || '-'}</td>
                                <td>${v.city || '-'}</td>
                                <td>${v.device || '-'}</td>
                                <td>${v.os || '-'}</td>
                                <td>${v.browser || '-'}</td>
                                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${v.url ? v.url.split('/').pop() || v.url : '-'}</td>
                            </tr>
                        `;
                    });
                    
                    today.textContent = todayCount;
                    week.textContent = weekCount;
                })
                .catch(err => {
                    console.log(err);
                    document.getElementById('visitorsBody').innerHTML = '<tr><td colspan="10" class="no-data">خطأ في تحميل البيانات</td></tr>';
                });
        }
        
        loadData();
        setInterval(loadData, 30000); // تحديث كل 30 ثانية
    </script>
</body>
</html>
